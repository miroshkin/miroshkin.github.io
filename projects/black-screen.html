<!DOCTYPE html>
<title>Black</title>
<body style="background:#000;">
<script>
  document.addEventListener('keydown', function(e) {
    if (e.key === 'f' || e.key === 'F') {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }
  });
</script>
</body>
